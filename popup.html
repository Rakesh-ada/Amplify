<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Song Player</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Pixelify+Sans&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  
</head>
<body>
  <div class="container">
    <header>
      <h1>YT_Amplify</h1>
      <input id="songQuery" type="text" placeholder="Search for a song..." />
      <button id="searchButton" class=""disabled>Search</button>
    </header>
    
    <img id="loadingGif" src="giphy.webp" alt="Loading..." />
    
    

<!-- Song results -->
<ul id="songResults" class="song-list"></ul>




    <div class="box">
      <button id="backButton">Prev. Tab</button>
      <!-- Favorite Button Section -->
<button id="favoriteButton" class="favorite-btn">
  <span id="heartIcon" class="heart">&#9829;</span> <!-- Heart Icon -->
</button>


      <button id="closeButton">Close Tab</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
